<!doctype html>
<html lang="he" dir="rtl">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/png" href="/images/ad_neighborhoods.png" />
		<link rel="apple-touch-icon" href="/images/ad_neighborhoods.png" />
		<link rel="shortcut icon" href="/images/ad_neighborhoods.png" />
		<!-- Open Graph / WhatsApp sharing -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="יוצאים לחירות" />
		<meta property="og:description" content="מתקדמים לעולם סולידרי, אחראי וחופשי" />
		<meta property="og:image" content="/images/ad_neighborhoods.png" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="יוצאים לחירות" />
		<meta name="twitter:description" content="מתקדמים לעולם סולידרי, אחראי וחופשי" />
		<meta name="twitter:image" content="/images/ad_neighborhoods.png" />
		<!-- preload ל-LCP assets: ה-poster של רקע הוידאו וה-thumbnail של YouTube מופיעים על המסך הראשון.
		     preconnect ל-i.ytimg.com מקצר את ה-handshake לתמונה הזו. -->
		<link rel="preload" as="image" href="/images/bg-poster.jpg" fetchpriority="high" />
		<link rel="preconnect" href="https://i.ytimg.com" crossorigin />
		<link rel="dns-prefetch" href="https://www.youtube-nocookie.com" />
		<!-- פונט Assistant - preconnect מקצר את ה-FOUT (פונט סריף עברי בזק לפני שהפונט הסופי נטען).
		     display=optional: אם הפונט לא נטען ב-100ms, נשאר ב-fallback - אין החלפה צורמת באמצע הצפייה.
		     preload של ה-CSS עם as=style + onload swap מטעין במקביל ולא חוסם render. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=optional" onload="this.onload=null;this.rel='stylesheet'" />
		<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=optional" /></noscript>
		<!-- inline fallback - חל מיד לפני שכל CSS חיצוני נטען. כך נמנע הבזק של פונט סריף ברירת מחדל של הדפדפן. -->
		<style>
			html, body {
				font-family: 'Assistant', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
				background-color: #070b14;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
